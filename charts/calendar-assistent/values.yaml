replicaCount: 1

image:
  repository: ghcr.io/jo-hoe/calendar-assistent
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: calendar-assistent.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

configAsSecret: true

existingConfigSecret: ""

configRaw: ""

config:
  server:
    address: ":8080"
    readTimeout: "15s"
    writeTimeout: "2m"
    idleTimeout: "60s"
    maxUpload: "10MiB"
    apiKey: ""
    logLevel: "info"
  llm:
    provider: "mock"
    aiproxy:
      baseUrl: ""
      apiKey: ""
      model: "gpt-4o"
      systemPrompt: ""
      temperature: 0.2
      maxTokens: 4096
  calendar:
    provider: "google"
    google:
      credentialsFile: "/app/secrets/google-credentials.json"
      calendarId: "primary"
      timeZone: "UTC"

googleCredentials: ""
