{{- if and (not .Values.existingConfigSecret) (not .Values.configAsSecret) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "calendar-assistent.fullname" . }}-config
  labels:
    {{- include "calendar-assistent.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.configRaw }}
    {{ tpl .Values.configRaw . | nindent 4 }}
    {{- else }}
    server:
      address: {{ .Values.config.server.address | quote }}
      readTimeout: {{ .Values.config.server.readTimeout | quote }}
      writeTimeout: {{ .Values.config.server.writeTimeout | quote }}
      idleTimeout: {{ .Values.config.server.idleTimeout | quote }}
      maxUpload: {{ .Values.config.server.maxUpload | quote }}
      apiKey: {{ .Values.config.server.apiKey | quote }}
      logLevel: {{ .Values.config.server.logLevel | quote }}
    llm:
      provider: {{ .Values.config.llm.provider | quote }}
      aiproxy:
        baseUrl: {{ .Values.config.llm.aiproxy.baseUrl | quote }}
        apiKey: {{ .Values.config.llm.aiproxy.apiKey | quote }}
        model: {{ .Values.config.llm.aiproxy.model | quote }}
        systemPrompt: {{ .Values.config.llm.aiproxy.systemPrompt | quote }}
        temperature: {{ .Values.config.llm.aiproxy.temperature }}
        maxTokens: {{ .Values.config.llm.aiproxy.maxTokens }}
    calendar:
      provider: {{ .Values.config.calendar.provider | quote }}
      google:
        credentialsFile: {{ .Values.config.calendar.google.credentialsFile | quote }}
        calendarId: {{ .Values.config.calendar.google.calendarId | quote }}
        timeZone: {{ .Values.config.calendar.google.timeZone | quote }}
    {{- end }}
{{- end }}
