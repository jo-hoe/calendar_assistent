apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "calendar-assistent.fullname" . }}
  labels:
    {{- include "calendar-assistent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "calendar-assistent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret-config.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "calendar-assistent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "calendar-assistent.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            {{- if .Values.googleCredentials }}
            - name: google-credentials
              mountPath: /app/secrets/google
              readOnly: true
            {{- end }}
            {{- if .Values.s3Credentials }}
            - name: s3-credentials
              mountPath: /app/secrets/s3
              readOnly: true
            {{- end }}
            {{- if .Values.smtpCredentials }}
            - name: smtp-credentials
              mountPath: /app/secrets/smtp
              readOnly: true
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          {{- if .Values.existingConfigSecret }}
          secret:
            secretName: {{ .Values.existingConfigSecret }}
          {{- else if .Values.configAsSecret }}
          secret:
            secretName: {{ include "calendar-assistent.fullname" . }}-config
          {{- else }}
          configMap:
            name: {{ include "calendar-assistent.fullname" . }}-config
          {{- end }}
        {{- if .Values.googleCredentials }}
        - name: google-credentials
          secret:
            secretName: {{ include "calendar-assistent.fullname" . }}-google-credentials
        {{- end }}
        {{- if .Values.s3Credentials }}
        - name: s3-credentials
          secret:
            secretName: {{ include "calendar-assistent.fullname" . }}-s3-credentials
        {{- end }}
        {{- if .Values.smtpCredentials }}
        - name: smtp-credentials
          secret:
            secretName: {{ include "calendar-assistent.fullname" . }}-smtp-credentials
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
