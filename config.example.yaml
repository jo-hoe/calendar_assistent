server:
  address: ":8080"
  readTimeout: "15s"
  writeTimeout: "2m"
  idleTimeout: "60s"
  maxUpload: "10MiB"
  # apiKey: "your-api-key-here"  # uncomment to require API key
  logLevel: "info"

llm:
  provider: "mock"  # "mock" or "aiproxy"
  aiproxy:
    # baseUrl: "http://host.docker.internal:11434"  # AI proxy URL
    baseUrl: ""
    apiKey: "${AIPROXY_API_KEY}"
    model: "gpt-4o"
    systemPrompt: ""  # empty = use embedded default prompt
    temperature: 0.2
    maxTokens: 4096

calendar:
  provider: "google"  # "google" | "webcal" | "smtp" | "mock"
  google:
    credentialsFile: "/app/secrets/google/google-credentials.json"
    calendarId: "primary"
    timeZone: "UTC"
  webcal:
    eventTtl: "720h"  # prune events from the .ics after this duration past their end time (default 30 days)
    storage:
      provider: "s3"  # only "s3" supported today
      s3:
        bucket: "my-bucket"
        key: "calendar.ics"
        region: "eu-central-1"
        credentialsFile: "/app/secrets/s3-credentials.json"
        endpoint: ""         # optional: override for MinIO / LocalStack, e.g. "http://localhost:4566"
        publicUrl: "https://my-bucket.s3.eu-central-1.amazonaws.com/calendar.ics"
  smtp:
    host: "smtp.gmail.com"
    port: 587
    authMethod: "plain"   # "none", "plain", or "login"
    credentialsFile: "/app/secrets/smtp/smtp-credentials.json"
    from: "Calendar Assistent <noreply@example.com>"
    to: "recipient@example.com"
    tls: false            # set true for port 465 (implicit TLS); false uses STARTTLS on port 587
